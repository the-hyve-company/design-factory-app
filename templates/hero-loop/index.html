<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Hero Loop</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #0c0c0a;
        color: #d0dbc4;
        font-family:
          "Geist",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      .stage {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .grain {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.08;
        mix-blend-mode: overlay;
        background-image:
          radial-gradient(circle at 25% 30%, rgba(216, 138, 107, 0.4), transparent 50%),
          radial-gradient(circle at 75% 70%, rgba(140, 175, 140, 0.3), transparent 50%);
        animation: drift 8s ease-in-out infinite alternate;
      }
      @keyframes drift {
        from {
          transform: translate(0, 0) scale(1);
        }
        to {
          transform: translate(-3%, 2%) scale(1.04);
        }
      }

      .composition {
        position: relative;
        text-align: center;
        z-index: 1;
      }

      .eyebrow {
        font-family: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
        font-size: 14px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(208, 219, 196, 0.46);
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeInDown 800ms cubic-bezier(0.22, 1, 0.36, 1) 200ms forwards;
      }

      .display {
        font-family: "Geist", "Inter", sans-serif;
        font-size: clamp(56px, 9vw, 144px);
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 0.96;
        color: #fbfcf3;
        margin-bottom: 28px;
      }
      .display .word {
        display: inline-block;
        overflow: hidden;
        margin: 0 0.06em;
        vertical-align: top;
      }
      .display .word .inner {
        display: inline-block;
        transform: translateY(110%);
        animation: rise 1100ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      .display .word:nth-of-type(1) .inner {
        animation-delay: 400ms;
      }
      .display .word:nth-of-type(2) .inner {
        animation-delay: 540ms;
      }
      .display .word:nth-of-type(3) .inner {
        animation-delay: 680ms;
      }
      .display em {
        font-style: italic;
        font-family: "Fraunces", "Georgia", serif;
        color: #d88a6b;
      }

      .lede {
        font-size: clamp(16px, 1.3vw, 22px);
        color: rgba(208, 219, 196, 0.74);
        line-height: 1.5;
        max-width: 56ch;
        margin: 0 auto 36px;
        opacity: 0;
        animation: fadeInUp 700ms cubic-bezier(0.22, 1, 0.36, 1) 980ms forwards;
      }

      .meta-row {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        font-family: "Geist Mono", monospace;
        font-size: 12px;
        color: rgba(208, 219, 196, 0.54);
        opacity: 0;
        animation: fadeIn 600ms ease-out 1280ms forwards;
      }
      .meta-row .pill {
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(251, 252, 243, 0.14);
        color: #d0dbc4;
      }
      .meta-row .dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #8ab06b;
        animation: heartbeat 1.6s ease-in-out infinite;
      }

      @keyframes rise {
        from {
          transform: translateY(110%);
        }
        to {
          transform: translateY(0);
        }
      }
      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes heartbeat {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.4);
          opacity: 0.5;
        }
      }

      /* Loop seam — content fades back to its starting state in the last
     0.5s so when video loops there's no jump. */
      .stage {
        animation: loopFade 8s linear infinite;
      }
      @keyframes loopFade {
        0%,
        92% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="grain"></div>
      <div class="composition">
        <div class="eyebrow">HYVE · Studio</div>
        <h1 class="display">
          <span class="word"><span class="inner">Craft</span></span>
          <span class="word"><span class="inner">over</span></span>
          <span class="word"
            ><span class="inner"><em>generation</em></span></span
          >
        </h1>
        <p class="lede">
          Designers dirigem. IA acelera onde for chamada. Cada output é uma decisão, não um
          acidente.
        </p>
        <div class="meta-row">
          <span class="pill">Hero loop · 8s</span>
          <span class="dot"></span>
          <span>edit me in the chat</span>
        </div>
      </div>
    </div>
  </body>
</html>
